<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codem UI Redesign V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        'primary-hover': '#4f46e5',
                        surface: '#f8fafc',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-slate-800 h-screen w-screen overflow-hidden flex selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Sidebar -->
    <aside class="w-[260px] bg-slate-50 border-r border-slate-200 flex flex-col h-full flex-shrink-0 relative z-10">
        
        <!-- App Header -->
        <div class="h-12 flex items-center px-4 shrink-0 mt-2">
            <div class="flex items-center gap-2">
                <div class="w-3.5 h-3.5 bg-indigo-600 rounded-sm rotate-45 shadow-sm shadow-indigo-200"></div>
                <span class="font-bold text-slate-800 tracking-wide text-sm">Codem</span>
            </div>
        </div>

        <!-- User Profile Area - Reduced pb-3 to pb-2 -->
        <div class="px-3 pb-2 mt-1 shrink-0 border-b border-slate-100">
            <div class="flex items-center justify-between p-2 rounded-lg hover:bg-slate-100/80 transition-colors cursor-pointer group">
                <div class="flex items-center gap-2">
                    <div class="w-6 h-6 flex items-center justify-center bg-orange-100 rounded-md shadow-sm">
                        <span class="text-xs">🦊</span>
                    </div>
                    <span class="text-sm font-semibold text-slate-700">CXB的助手</span>
                </div>
                <!-- Removed opacity-0 and group-hover:opacity-100 to make icons always visible -->
                <div class="flex items-center gap-1.5 text-slate-400 transition-opacity">
                    <i class="ph ph-magnifying-glass hover:text-slate-600"></i>
                    <i class="ph ph-gear hover:text-slate-600"></i>
                    <i class="ph ph-moon hover:text-slate-600"></i>
                </div>
            </div>
        </div>

        <!-- Main Navigation - Reduced py-4 to py-2 -->
        <nav class="px-3 py-2 flex flex-col gap-1 shrink-0 border-b border-slate-100">
            <button class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 rounded-lg hover:bg-slate-100 transition-colors">
                <i class="ph ph-pencil-simple text-orange-500 text-lg"></i>
                新对话
            </button>
            <button class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 rounded-lg hover:bg-slate-100 transition-colors">
                <i class="ph ph-book-bookmark text-indigo-500 text-lg"></i>
                知识笔记本
            </button>
            <button class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-700 rounded-lg hover:bg-slate-100 transition-colors">
                <i class="ph ph-clock-counter-clockwise text-pink-500 text-lg"></i>
                自动化
            </button>
        </nav>

        <!-- Segmented Controls (MCP / 技能 / 记忆) - Reduced py-4 to py-2 -->
        <div class="px-4 py-2 shrink-0 border-b border-slate-100">
            <div class="bg-slate-200/50 p-1 rounded-xl flex gap-1 shadow-inner relative">
                <!-- Active background pill -->
                <div class="absolute left-1 top-1 bottom-1 w-[31%] bg-white rounded-lg shadow-sm border border-slate-200/60 transition-all"></div>
                
                <button class="flex-1 flex flex-col items-center justify-center py-2 text-xs font-medium text-slate-700 z-10 relative">
                    <i class="ph-fill ph-plug text-slate-700 mb-1 text-base"></i>
                    MCP
                </button>
                <button class="flex-1 flex flex-col items-center justify-center py-2 text-xs font-medium text-slate-500 hover:text-slate-700 z-10 transition-colors">
                    <i class="ph-fill ph-squares-four text-emerald-500 mb-1 text-base"></i>
                    技能
                </button>
                <button class="flex-1 flex flex-col items-center justify-center py-2 text-xs font-medium text-slate-500 hover:text-slate-700 z-10 transition-colors">
                    <i class="ph-fill ph-brain text-pink-400 mb-1 text-base"></i>
                    记忆
                </button>
            </div>
        </div>

        <!-- Scrollable Lists -->
        <div class="flex-1 overflow-y-auto px-2 py-2 flex flex-col gap-4">
            
            <!-- Global Chats -->
            <div class="px-2">
                <div class="text-xs font-semibold text-slate-400 mb-2 px-1">全局对话</div>
                <div class="flex flex-col gap-0.5">
                    <div class="text-[11px] font-medium text-slate-400 mt-1 mb-1 px-1">今天</div>
                    <button class="w-full text-left px-2.5 py-1.5 text-sm text-slate-600 rounded-md bg-slate-200/50 font-medium">对话 7</button>
                    <button class="w-full text-left px-2.5 py-1.5 text-sm text-slate-600 rounded-md hover:bg-slate-100 transition-colors">对话 6</button>
                    <button class="w-full text-left px-2.5 py-1.5 text-sm text-slate-600 rounded-md hover:bg-slate-100 transition-colors">对话 5</button>
                    <button class="w-full text-left px-2.5 py-1.5 text-sm text-slate-600 rounded-md hover:bg-slate-100 transition-colors">对话 4</button>
                </div>
            </div>

            <!-- Projects -->
            <div class="px-2 mt-2">
                <div class="flex items-center justify-between text-xs font-semibold text-slate-400 mb-2 px-1">
                    <span>项目</span>
                    <button class="hover:text-slate-600"><i class="ph ph-plus"></i></button>
                </div>
                <div class="flex flex-col gap-1">
                    <button class="flex items-center gap-2 w-full text-left px-2 py-1.5 text-sm text-slate-600 rounded-md hover:bg-slate-100 transition-colors group">
                        <i class="ph-fill ph-caret-right text-[10px] text-slate-300 group-hover:text-slate-400 transition-colors"></i>
                        <i class="ph-fill ph-folder text-yellow-400"></i>
                        <span class="truncate">1123测试</span>
                    </button>
                    <button class="flex items-center gap-2 w-full text-left px-2 py-1.5 text-sm text-slate-600 rounded-md hover:bg-slate-100 transition-colors group">
                        <i class="ph-fill ph-caret-right text-[10px] text-slate-300 group-hover:text-slate-400 transition-colors"></i>
                        <i class="ph-fill ph-folder text-yellow-400"></i>
                        <span class="truncate">1大模型工...</span>
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 bg-white flex flex-col h-full relative min-w-0">
        
        <!-- Top Navigation Tabs -->
        <header class="h-[46px] border-b border-slate-200 flex items-center px-4 shrink-0 bg-white/80 backdrop-blur-sm z-20">
            <div class="flex h-full">
                <button class="px-4 h-full flex items-center gap-2 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600">
                    <i class="ph ph-chats text-lg"></i>
                    对话
                </button>
                <button class="px-4 h-full flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">
                    <i class="ph ph-terminal-window text-lg"></i>
                    终端
                </button>
            </div>
            <!-- Window controls placeholder for desktop app feel -->
            <div class="ml-auto flex items-center gap-4 text-slate-400">
                <i class="ph ph-minus hover:text-slate-600 cursor-pointer"></i>
                <i class="ph ph-square hover:text-slate-600 cursor-pointer"></i>
                <i class="ph ph-x hover:text-slate-600 cursor-pointer"></i>
            </div>
        </header>

        <!-- Sub Toolbar -->
        <div class="h-12 border-b border-slate-100 flex items-center px-6 gap-4 shrink-0 bg-white z-10">
            <button class="text-slate-400 hover:text-slate-600"><i class="ph ph-list text-xl"></i></button>
            
            <div class="flex items-center gap-2 bg-indigo-50/50 hover:bg-indigo-50 px-3 py-1.5 rounded-lg cursor-pointer border border-indigo-100/50 transition-colors">
                <span class="text-sm font-semibold text-slate-700">Codem</span>
                <span class="text-xs font-medium text-indigo-600 bg-indigo-100 px-1.5 py-0.5 rounded">mimo-v2.5-pro</span>
                <i class="ph ph-caret-down text-slate-400 text-xs ml-1"></i>
            </div>

            <!-- Plugin Icons -->
            <div class="flex items-center gap-2 ml-2">
                <button class="w-8 h-8 flex items-center justify-center rounded bg-indigo-50 text-indigo-500 border border-indigo-100/80 shadow-sm"><i class="ph ph-cloud"></i></button>
                <button class="w-8 h-8 flex items-center justify-center rounded text-slate-400 hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all"><i class="ph ph-robot"></i></button>
                <button class="w-8 h-8 flex items-center justify-center rounded text-slate-400 hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all"><i class="ph ph-camera"></i></button>
                <button class="w-8 h-8 flex items-center justify-center rounded text-slate-400 hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all"><i class="ph ph-chart-bar"></i></button>
                <button class="w-8 h-8 flex items-center justify-center rounded bg-indigo-50 text-indigo-500 border border-indigo-100/80 shadow-sm"><i class="ph ph-link"></i></button>
            </div>
            
            <div class="ml-auto w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
        </div>

        <!-- Center Empty State -->
        <div class="flex-1 flex flex-col items-center justify-center pb-32 z-0">
            <div class="w-16 h-16 flex items-center justify-center mb-6">
                <!-- Using a custom SVG for the thunder to match the orange brand feel -->
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="url(#paint0_linear)" stroke="none"/>
                    <defs>
                        <linearGradient id="paint0_linear" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#FF9A44"/>
                            <stop offset="1" stop-color="#FC6076"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight mb-3">Codem</h1>
            <p class="text-slate-500 text-sm">开始对话，让我帮你写代码</p>
        </div>

        <!-- Bottom Input Area -->
        <div class="absolute bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent pt-10 pb-6 px-8 flex justify-center z-20">
            <div class="w-full max-w-4xl flex flex-col gap-2">
                
                <!-- Main Input Box -->
                <div class="bg-white border border-slate-200 shadow-sm rounded-2xl p-2 pl-3 flex items-center gap-3 focus-within:ring-2 focus-within:ring-indigo-500/20 focus-within:border-indigo-400 transition-all">
                    
                    <!-- Left Tools -->
                    <div class="flex items-center gap-1.5 shrink-0">
                        <button class="text-slate-400 hover:text-slate-600 p-1.5 rounded-lg hover:bg-slate-50 transition-colors">
                            <i class="ph ph-paperclip text-lg"></i>
                        </button>
                        <button class="text-pink-500 bg-pink-50 hover:bg-pink-100 p-1.5 rounded-lg border border-pink-100 transition-colors">
                            <i class="ph ph-target text-lg"></i>
                        </button>
                        <button class="text-orange-500 bg-orange-50 hover:bg-orange-100 p-1.5 rounded-lg border border-orange-100 transition-colors">
                            <i class="ph ph-lightning text-lg"></i>
                        </button>
                        
                        <div class="h-5 w-[1px] bg-slate-200 mx-1"></div>
                        
                        <button class="flex items-center gap-1.5 bg-blue-50 text-blue-600 px-2.5 py-1.5 rounded-lg border border-blue-100 hover:bg-blue-100 transition-colors">
                            <i class="ph-fill ph-shield-check"></i>
                            <span class="text-xs font-semibold">请求批准</span>
                        </button>
                    </div>

                    <!-- Input Field -->
                    <input type="text" placeholder="请新建或选择历史对话后发起任务" disabled class="flex-1 bg-transparent border-none outline-none text-sm text-slate-700 placeholder-slate-400 py-2 cursor-not-allowed">
                    
                    <!-- Right Tools -->
                    <div class="flex items-center gap-2 shrink-0 pr-1">
                        <button class="text-slate-400 hover:text-slate-600 p-1.5 rounded-lg hover:bg-slate-50 transition-colors">
                            <i class="ph ph-sidebar-simple text-lg"></i>
                        </button>
                        <button class="bg-slate-100 text-slate-300 p-2 rounded-xl cursor-not-allowed">
                            <i class="ph ph-arrow-right font-bold"></i>
                        </button>
                    </div>
                </div>

                <!-- Bottom Status Bar -->
                <div class="flex items-center justify-between px-2">
                    <div class="flex items-center gap-3">
                        <button class="flex items-center gap-1.5 text-xs text-slate-500 hover:text-slate-700 transition-colors">
                            <i class="ph ph-globe text-slate-400"></i>
                            全局对话
                            <i class="ph ph-caret-down text-[10px]"></i>
                        </button>
                        <button class="flex items-center gap-1.5 text-xs text-slate-500 hover:text-slate-700 transition-colors">
                            <i class="ph ph-house text-orange-400"></i>
                            本地处理
                            <i class="ph ph-caret-down text-[10px]"></i>
                        </button>
                    </div>
                    <div class="text-xs text-slate-400">
                        输入 / 选择技能
                    </div>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
